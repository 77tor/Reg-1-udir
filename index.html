<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kartleggingsprøve i Regning - 1. trinn</title>
    <style>
        :root { 
            --blue: #4A90E2; 
            --green: #48BB78; 
            --bg: #f0f4f8; 
            --text: #2d3748;
            --red: #e53e3e;
        }
        
        body { 
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 10px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--text);
            touch-action: manipulation;
        }

        .container { 
            background: white; 
            width: 95%; 
            max-width: 950px; 
            min-height: 500px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding: 25px; 
            position: relative; 
            margin-bottom: 110px; 
            box-sizing: border-box;
        }

        .welcome-box {
            background: #ebf5fb;
            border: 3px solid var(--blue);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
        }

        .question-box { display: none; }
        .question-box.active { display: block; }
        
        h2 { color: var(--blue); border-bottom: 2px solid #edf2f7; padding-bottom: 10px; }
        
        .layout-flex { 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            gap: 20px; 
            justify-content: center; 
            margin-top: 20px; 
        }

        .img-main { max-width: 250px; border-radius: 15px; border: 2px solid #eee; }
        
        /* Oppdatert stil for inputfelt */
        .input-large { 
            width: 100px; height: 100px; font-size: 50px; 
            text-align: center; border: 4px solid var(--blue); border-radius: 20px; 
        }

        /* Fjerner spinnere/piler i alle nettlesere */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .drag-source, .q13-drag-source { 
            min-height: 100px; border: 2px dashed #cbd5e0; padding: 15px; 
            display: flex; gap: 10px; justify-content: center; border-radius: 15px;
            width: 100%; box-sizing: border-box; margin-bottom: 20px;
        }

        .drag-item { 
            width: 80px; height: 80px; background: var(--blue); color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 35px; border-radius: 15px; cursor: pointer;
            touch-action: none; user-select: none; z-index: 10;
        }

        .drag-item-img {
            width: 80px; height: 80px; border-radius: 15px; cursor: pointer;
            touch-action: none; user-select: none; z-index: 10;
            object-fit: cover; border: 2px solid var(--blue);
        }

        .drop-target, .drop-target-large { 
            width: 90px; height: 90px; border: 4px dashed #cbd5e0; 
            border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; background: #fafafa; 
        }

        .number-line-container { width: 90%; position: relative; height: 100px; margin: 40px auto; touch-action: none; cursor: pointer; }
        .line-base { width: 100%; height: 6px; background: #333; position: absolute; top: 50%; border-radius: 3px; }
        .tick { position: absolute; height: 20px; width: 3px; background: #333; top: 50%; transform: translateY(-50%); }
        .tick-label { position: absolute; top: 60px; transform: translateX(-50%); font-weight: bold; font-size: 18px; }
        .arrow-pointer { position: absolute; top: -15px; font-size: 40px; transform: translateX(-50%); color: #e53e3e; pointer-events: none; }

        .footer-nav { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 15px 0; display: none; 
            justify-content: center; align-items: center; gap: 8px; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 2000; 
        }

        .page-dot { 
            width: 38px; height: 38px; display: flex; align-items: center; 
            justify-content: center; border: 2px solid #ddd; border-radius: 10px; 
            cursor: pointer; font-weight: bold; background: white;
        }
        .page-dot.active { background: #2d3748; color: white; border-color: #2d3748; }

        .img-card { border: 4px solid #edf2f7; border-radius: 20px; padding: 10px; cursor: pointer; background: white; }
        .img-card.selected { border-color: var(--green); background: #f0fff4; }
        .img-card img { max-width: 120px; height: auto; }

        #feedback-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin: 20px 0;
            padding: 20px;
            background: #f8fafc;
            border-radius: 20px;
        }
        .feedback-item { padding: 10px; border-radius: 10px; font-weight: bold; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center;}

        .hidden { display: none !important; }
        .btn-blue { background: var(--blue); color: white; border: none; padding: 15px 25px; border-radius: 15px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="start-page" class="container">
    <h1 style="text-align:center">Velkommen til regneøving!</h1>
    <div class="welcome-box">
        <p>Hører du lyden?</p>
        <button class="btn-blue" onclick="new Audio('test.mp3').play()">🔊 Test lyd</button>
        <br><br>
        <button onclick="startQuiz()" style="background:var(--green); color:white; border:none; padding:20px 40px; font-size:25px; border-radius:50px; cursor:pointer;">START ▶</button>
    </div>
</div>

<div id="quiz-wrap" class="container hidden">
    <div id="top-ui" style="text-align:right; margin-bottom:10px;">
        <audio id="audio-player" controls style="width:200px"></audio>
    </div>

    <div id="question-container">
        <div class="question-box" id="q1"><h2>Oppgave 1</h2><div class="layout-flex"><img src="01.png" class="img-main"><input type="text" inputmode="decimal" id="ans1" class="input-large"></div></div>
        <div class="question-box" id="q2"><h2>Oppgave 2</h2><div class="layout-flex"><img src="02.png" class="img-main"><input type="text" inputmode="decimal" id="ans2" class="input-large"></div></div>
        
        <div class="question-box" id="q3">
            <h2>Oppgave 3</h2>
            <div id="q3-source" class="drag-source">
                <div class="drag-item" id="q3_1">1</div>
                <div class="drag-item" id="q3_2">2</div>
                <div class="drag-item" id="q3_5">5</div>
                <div class="drag-item" id="q3_9">9</div>
            </div>
            <div class="layout-flex">
                <div class="drop-target" id="q3_d1"></div>
                <div class="drop-target" id="q3_d2"></div>
            </div>
        </div>

        <div class="question-box" id="q4">
            <h2>Oppgave 4</h2>
            <div id="q4-source" class="drag-source">
                <div class="drag-item" id="q4_1">1</div>
                <div class="drag-item" id="q4_3">3</div>
                <div class="drag-item" id="q4_5">5</div>
                <div class="drag-item" id="q4_7">7</div>
            </div>
            <div class="layout-flex">
                <div class="drop-target" id="q4_d1"></div>
                <div class="drop-target" id="q4_d2"></div>
            </div>
        </div>

        <div class="question-box" id="q5"><h2>Oppgave 5</h2><div class="layout-flex"><img src="05.png" style="width:150px"><div id="grid5" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"><div class="img-card" onclick="toggleSelection(this)"><img src="05_01.png"></div><div class="img-card" onclick="toggleSelection(this)" id="correct5_1"><img src="05_02.png"></div><div class="img-card" onclick="toggleSelection(this)"><img src="05_03.png"></div><div class="img-card" onclick="toggleSelection(this)" id="correct5_2"><img src="05_04.png"></div><div class="img-card" onclick="toggleSelection(this)"><img src="05_05.png"></div><div class="img-card" onclick="toggleSelection(this)" id="correct5_3"><img src="05_06.png"></div></div></div></div>
        <div class="question-box" id="q6"><h2>Oppgave 6</h2><div class="layout-flex"><img src="06.png" style="width:150px"><div id="grid6" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"><div class="img-card" onclick="toggleSelection(this)" id="correct6_1"><img src="06_01.png"></div><div class="img-card" onclick="toggleSelection(this)"><img src="06_02.png"></div><div class="img-card" onclick="toggleSelection(this)" id="correct6_3"><img src="06_03.png"></div><div class="img-card" onclick="toggleSelection(this)" id="correct6_4"><img src="06_04.png"></div><div class="img-card" onclick="toggleSelection(this)"><img src="06_05.png"></div><div class="img-card" onclick="toggleSelection(this)" id="correct6_5"><img src="06_06.png"></div></div></div></div>

        <div class="question-box" id="q7"><h2>Oppgave 7</h2><img src="07.png" style="width:150px; display:block; margin:auto;"><div class="number-line-container" id="nl7"><div class="line-base"></div><div id="arrow7" class="arrow-pointer" style="left: 0%">▼</div><div id="ticks7"></div></div></div>
        <div class="question-box" id="q8"><h2>Oppgave 8</h2><img src="08.png" style="width:150px; display:block; margin:auto;"><div class="number-line-container" id="nl8"><div class="line-base"></div><div id="arrow8" class="arrow-pointer" style="left: 0%">▼</div><div id="ticks8"></div></div></div>

        <div class="question-box" id="q9"><h2>Oppgave 9</h2><div class="layout-flex"><div style="font-size:60px">1 + 2 =</div><input type="text" inputmode="decimal" id="ans9" class="input-large"></div></div>
        <div class="question-box" id="q10"><h2>Oppgave 10</h2><div class="layout-flex"><div style="font-size:60px">3 + 3 =</div><input type="text" inputmode="decimal" id="ans10" class="input-large"></div></div>

        <div class="question-box" id="q11"><h2>Oppgave 11</h2><div class="layout-flex"><div class="drop-target" style="border-style:solid; font-size:40px;">3</div><input type="text" inputmode="decimal" id="ans11_a" class="input-large"><div class="drop-target" style="border-style:solid; font-size:40px;">5</div><input type="text" inputmode="decimal" id="ans11_b" class="input-large"></div></div>
        <div class="question-box" id="q12"><h2>Oppgave 12</h2><div class="layout-flex"><input type="text" inputmode="decimal" id="ans12_a" class="input-large"><input type="text" inputmode="decimal" id="ans12_b" class="input-large"><div class="drop-target" style="border-style:solid; font-size:40px;">9</div><div class="drop-target" style="border-style:solid; font-size:40px;">10</div></div></div>

        <div class="question-box" id="q13">
            <h2>Oppgave 13</h2>
            <div id="q13-source" class="q13-drag-source">
                <img src="13_03.png" class="drag-item-img" id="i13_3">
                <img src="13_02.png" class="drag-item-img" id="i13_2">
                <img src="13_04.png" class="drag-item-img" id="i13_4">
                <img src="13_01.png" class="drag-item-img" id="i13_1">
            </div>
            <div class="layout-flex">
                <img src="13.png" style="width:100px; height:100px; border:2px solid #333; border-radius:10px;">
                <div class="drop-target-large" id="d13_1"></div>
                <div class="drop-target-large" id="d13_2"></div>
                <div class="drop-target-large" id="d13_3"></div>
                <div class="drop-target-large" id="d13_4"></div>
            </div>
        </div>

        <div class="question-box" id="q14">
            <h2>Oppgave 14</h2>
            <div id="grid14" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
                <div class="img-card" onclick="toggleSelection(this)"><img src="14_01.png"></div>
                <div class="img-card" onclick="toggleSelection(this)" id="correct14_1"><img src="14_02.png"></div>
                <div class="img-card" onclick="toggleSelection(this)"><img src="14_03.png"></div>
                <div class="img-card" onclick="toggleSelection(this)" id="correct14_2"><img src="14_04.png"></div>
                <div class="img-card" onclick="toggleSelection(this)" id="correct14_3"><img src="14_05.png"></div>
                <div class="img-card" onclick="toggleSelection(this)"><img src="14_06.png"></div>
            </div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align:center;">
        <h2 style="font-size: 32px;">Ferdig!</h2>
        <h1 id="score-display" style="font-size: 70px; color: var(--blue); margin: 10px 0;">0 / 14</h1>
        <div id="feedback-list"></div>
        <button class="btn-blue" onclick="location.reload()">Start på nytt</button>
    </div>
</div>

<div class="footer-nav" id="main-nav">
    <button class="btn-blue" onclick="changePage(-1)">◀</button>
    <div id="page-dots-container" style="display:flex; gap:5px;"></div>
    <button class="btn-blue" onclick="changePage(1)">▶</button>
    <button id="submit-btn" class="hidden" style="background:var(--green); color:white; border:none; padding:10px; border-radius:10px;" onclick="finishTest()">Lever</button>
</div>

<script>
    let currentPage = 1;
    const totalPages = 14;
    const arrowPositions = { 7: 0, 8: 0 };

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-wrap').classList.remove('hidden');
        document.getElementById('main-nav').style.display = 'flex';
        init();
    }

    function init() {
        const dotsContainer = document.getElementById('page-dots-container');
        dotsContainer.innerHTML = '';
        for (let i = 1; i <= totalPages; i++) {
            const dot = document.createElement('div');
            dot.className = 'page-dot';
            dot.innerText = i;
            dot.id = 'dot-' + i;
            dot.onclick = () => goToPage(i);
            dotsContainer.appendChild(dot);
        }
        createTicks(7, 20, [0, 10, 20]);
        createTicks(8, 10, [0, 10]);
        setupNumberLineTouch();
        setupDragAndDrop();
        goToPage(1);
    }

    function goToPage(n) {
        if (n < 1 || n > totalPages) return;
        document.querySelectorAll('.question-box').forEach(q => q.classList.remove('active'));
        document.querySelectorAll('.page-dot').forEach(d => d.classList.remove('active'));
        document.getElementById('q' + n).classList.add('active');
        document.getElementById('dot-' + n).classList.add('active');
        
        const audio = document.getElementById('audio-player');
        audio.src = (n < 10 ? '0' + n : n) + '.mp3';
        currentPage = n;
        
        document.getElementById('submit-btn').className = (n === 14) ? "btn-blue" : "hidden";
        document.getElementById('submit-btn').style.background = "var(--green)";
    }

    function changePage(step) { goToPage(currentPage + step); }

    function createTicks(id, max, labels) {
        const container = document.getElementById('ticks' + id);
        container.innerHTML = ''; 
        for (let i = 0; i <= max; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            tick.style.left = (i / max * 100) + '%';
            if (labels.includes(i)) {
                const label = document.createElement('div');
                label.className = 'tick-label';
                label.innerText = i;
                label.style.left = (i / max * 100) + '%';
                container.appendChild(label);
            }
            container.appendChild(tick);
        }
    }

    function setupNumberLineTouch() {
        [7, 8].forEach(id => {
            const el = document.getElementById('nl' + id);
            const max = (id === 7) ? 20 : 10;
            const handle = (e) => {
                const rect = el.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const snapped = Math.max(0, Math.min(max, Math.round(((clientX - rect.left) / rect.width) * max)));
                document.getElementById('arrow' + id).style.left = (snapped / max * 100) + '%';
                arrowPositions[id] = snapped;
            };
            el.addEventListener('touchstart', handle);
            el.addEventListener('mousedown', handle);
        });
    }

    function setupDragAndDrop() {
        const draggables = document.querySelectorAll('.drag-item, .drag-item-img');
        draggables.forEach(item => {
            let active = false;
            const start = (e) => {
                active = true;
                item.style.position = 'fixed';
                move(e);
            };
            const move = (e) => {
                if (!active) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                item.style.left = (clientX - 40) + 'px';
                item.style.top = (clientY - 40) + 'px';
            };
            const end = (e) => {
                if (!active) return;
                active = false;
                item.style.display = 'none';
                const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
                const target = document.elementFromPoint(clientX, clientY)?.closest('.drop-target, .drop-target-large, .drag-source, .q13-drag-source');
                item.style.display = 'block';
                if (item.classList.contains('drag-item')) item.style.display = 'flex';
                item.style.position = 'static';
                
                if (target) {
                    if (target.classList.contains('drop-target') || target.classList.contains('drop-target-large')) {
                        if (target.children.length > 0) {
                            const current = target.children[0];
                            const sourceId = current.id.includes('i13') ? 'q13-source' : (current.id.split('_')[0] + '-source');
                            const backTo = document.getElementById(sourceId);
                            if (backTo) backTo.appendChild(current);
                        }
                    }
                    target.appendChild(item);
                }
            };
            item.addEventListener('touchstart', start);
            item.addEventListener('touchmove', (e) => { e.preventDefault(); move(e); });
            item.addEventListener('touchend', end);
            item.addEventListener('mousedown', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', end);
        });
    }

    function toggleSelection(el) { el.classList.toggle('selected'); }

    function finishTest() {
        let score = 0;
        let results = [];
        const check = (isCorrect) => { results.push(isCorrect); if (isCorrect) score++; };

        // Sjekker verdier (trimmer i tilfelle mellomrom)
        check(document.getElementById('ans1').value.trim() == "5");
        check(document.getElementById('ans2').value.trim() == "8");
        const v3 = Array.from(document.querySelectorAll('#q3_d1 div, #q3_d2 div')).map(e => e.innerText);
        check(v3.includes('1') && v3.includes('9'));
        const v4 = Array.from(document.querySelectorAll('#q4_d1 div, #q4_d2 div')).map(e => e.innerText);
        check(v4.includes('3') && v4.includes('7'));
        check(document.querySelectorAll('#grid5 .selected').length === 3 && document.querySelectorAll('#correct5_1.selected, #correct5_2.selected, #correct5_3.selected').length === 3);
        check(document.querySelectorAll('#grid6 .selected').length === 4 && document.querySelectorAll('#correct6_1.selected, #correct6_3.selected, #correct6_4.selected, #correct6_5.selected').length === 4);
        check(arrowPositions[7] === 5);
        check(arrowPositions[8] === 4);
        check(document.getElementById('ans9').value.trim() == "3");
        check(document.getElementById('ans10').value.trim() == "6");
        check(document.getElementById('ans11_a').value.trim() == "4" && document.getElementById('ans11_b').value.trim() == "6");
        check(document.getElementById('ans12_a').value.trim() == "7" && document.getElementById('ans12_b').value.trim() == "8");
        
        const q13c = document.getElementById('d13_1').firstChild?.id === 'i13_3' && 
                     document.getElementById('d13_2').firstChild?.id === 'i13_2' && 
                     document.getElementById('d13_3').firstChild?.id === 'i13_4' && 
                     document.getElementById('d13_4').firstChild?.id === 'i13_1';
        check(q13c);
        
        check(document.querySelectorAll('#grid14 .selected').length === 3 && document.querySelectorAll('#correct14_1.selected, #correct14_2.selected, #correct14_3.selected').length === 3);
        
        document.getElementById('question-container').classList.add('hidden');
        document.getElementById('top-ui').classList.add('hidden');
        document.getElementById('main-nav').classList.add('hidden');
        
        const feedbackList = document.getElementById('feedback-list');
        feedbackList.innerHTML = '';
        results.forEach((res, i) => {
            const div = document.createElement('div');
            div.className = 'feedback-item';
            div.innerHTML = `Oppgave ${i+1}<br>${res ? '✅' : '⭕'}`;
            div.style.color = res ? 'var(--green)' : 'var(--red)';
            feedbackList.appendChild(div);
        });

        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('score-display').innerText = score + " / 14";
    }
</script>
</body>
</html>
